<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Xiong Shi</title>
    <style>
        body { 
            font-family: 'Aptos', 'Segoe UI', 'Ubuntu', 'Cantarell', 'Helvetica Neue', sans-serif; 
            line-height: 1.6; padding: 20px; max-width: 900px; margin: auto; color: black; 
        }
        
        /* 1. 标题稍微加大 */
        #main-title { 
            text-align: center; 
            font-size: clamp(3rem, 12vw, 6rem); /* 最小值从2.5调到3，最大值从5调到6 */
            font-style: italic; 
            font-weight: bold; 
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* 导航栏基础样式 */
        .nav-container { position: relative; }
        .navigation {
            display: flex; justify-content: center; list-style: none; padding: 0; flex-wrap: wrap;
            margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .navigation li { margin: 0 20px; }
        .navigation a { text-decoration: none; color: inherit; font-weight: 500; font-size: 1.1rem; }

        /* 2. 手机端菜单键（默认隐藏） */
        .menu-toggle {
            display: none;
            position: absolute;
            right: 0;
            top: -50px;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* 3. 图片稍微加大 */
        .image-container { 
            text-align: center; 
            margin: 40px auto; 
            max-width: 450px; /* 从320px调大到450px */
        }
        .myImage { 
            width: 100%; 
            height: auto; 
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .center-text { text-align: center; font-size: 1.3rem; padding: 0 10px; }
        .center-text p { margin-bottom: 18px; }
        footer { text-align: center; margin-top: 60px; font-size: 0.8em; color: #666; }

        /* 4. 手机端响应式逻辑 */
        @media (max-width: 600px) {
            #main-title { text-align: left; padding-right: 50px; } /* 给菜单键留位置 */
            
            .menu-toggle { display: block; } /* 显示菜单键 */
            
            .navigation {
                display: none; /* 默认隐藏菜单 */
                flex-direction: column;
                text-align: center;
                border-bottom: none;
                background: #f9f9f9;
                padding: 20px 0;
                border-radius: 8px;
            }
            .navigation.active { display: flex; } /* 点击后显示 */
            .navigation li { margin: 10px 0; }
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <h1 id="main-title">Xiong Shi</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        
        <ul class="navigation" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="research.html">Research</a></li>
            <li><a href="publication.html">Publication</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="image-container">
        <img src="sunset.jpg" alt="Xiong Shi" class="myImage">
    </div>

    <div class="center-text">
      <p>
        I obtained my PhD from the <a href="https://www.biologie.uni-konstanz.de/kleunen/" style="color:inherit; font-weight: bold; text-decoration: underline;">University of Konstanz</a>, 
        supervised by <a href="https://www.biologie.uni-konstanz.de/kleunen/team/prof-dr-mark-van-kleunen/" style="color:inherit; font-weight: bold; text-decoration: underline;">Prof. Dr. Mark van Kleunen</a>.
      </p>
      
      <p>
        In May 2026, I will join <strong>Peking University</strong> as a Postdoctoral Fellow.
      </p>
    </div>

    <footer>&copy; 2026 Xiong Shi</footer>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("navMenu");
            if (menu.className === "navigation") {
                menu.className += " active";
            } else {
                menu.className = "navigation";
            }
        }
    </script>
</body>
</html>

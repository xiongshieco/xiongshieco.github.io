<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Xiong Shi</title>
    <style>
        body { 
            font-family: 'Aptos', 'Segoe UI', 'Ubuntu', 'Cantarell', 'Helvetica Neue', sans-serif; 
            line-height: 1.6; padding: 20px; max-width: 950px; margin: auto; color: black; 
        }
        #main-title { 
            text-align: center; font-size: clamp(3rem, 12vw, 6rem); 
            font-style: italic; font-weight: bold; margin-top: 0; margin-bottom: 20px;
        }
        .nav-container { position: relative; width: 100%; }
        
        .navigation {
            display: flex; justify-content: center; list-style: none; padding: 0; flex-wrap: wrap;
            margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px;
        }
        .navigation li { margin: 0 25px; }
        .navigation a { 
            text-decoration: none; color: inherit; font-weight: 500; 
            font-size: 1.5rem; letter-spacing: 0.5px; transition: 0.3s;
        }
        .navigation a:hover { text-decoration: underline; opacity: 0.7; }

        .menu-toggle {
            display: none; position: absolute; right: 10px; top: 20px; 
            cursor: pointer; background: none; border: none; padding: 5px; z-index: 100;
        }
        .hamburger-lines { display: flex; flex-direction: column; justify-content: space-between; height: 22px; width: 32px; }
        .line { height: 3px; width: 100%; background-color: black; border-radius: 10px; }

        /* --- 轮播图主体 --- */
        .slider-container {
            max-width: 450px;
            margin: 40px auto 10px;
            position: relative;
        }

        .slider-wrapper {
            position: relative;
            cursor: grab;
            overflow: hidden; 
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .slider-wrapper:active { cursor: grabbing; }

        .image-slider {
            display: flex;
            transition: transform 0.5s ease-in-out; 
            width: 100%;
        }

        .image-slider img {
            width: 100%;
            flex-shrink: 0;
            /* --- 修改点：统一高度，防止内容抖动 --- */
            height: 300px; 
            object-fit: cover;
            /* ---------------------------------- */
            user-select: none;
            -webkit-user-drag: none;
        }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.8); border: none; width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer; z-index: 10; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .nav-btn:hover { background: #fff; transform: translateY(-50%) scale(1.1); }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }

        .slider-hint { 
            text-align: center; 
            font-size: 0.85rem; 
            color: #777; 
            margin-top: 12px; 
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .center-text { text-align: center; font-size: 1.4rem; padding: 0 10px; max-width: 750px; margin: 0 auto; margin-top: 30px; }
        footer { text-align: center; margin-top: 60px; font-size: 0.8em; color: #666; padding-bottom: 20px; }

        @media (max-width: 768px) {
            #main-title { text-align: left; padding-right: 60px; font-size: 3rem; }
            .menu-toggle { display: block; }
            .navigation {
                display: none; flex-direction: column; text-align: right;    
                padding-right: 25px; border-bottom: none; background: #fdfdfd; 
                padding-top: 20px; padding-bottom: 20px; width: 100%; 
                position: absolute; top: 80px; left: 0; z-index: 50;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }
            .navigation.active { display: flex; }
            .navigation li { margin: 15px 0; }
            .nav-btn { display: none; }
            /* 手机端图片高度可适当调低 */
            .image-slider img { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <h1 id="main-title">Xiong Shi</h1>
        <button class="menu-toggle" onclick="toggleMenu()">
            <div class="hamburger-lines"><span class="line"></span><span class="line"></span><span class="line"></span></div>
        </button>
        <ul class="navigation" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="research.html">Research</a></li>
            <li><a href="publication.html">Publication</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="slider-container">
        <div class="slider-wrapper" id="wrapper">
            <button class="nav-btn btn-prev" id="prevBtn">&#10094;</button>
            <div class="image-slider" id="slider">
                <img src="sunset.jpg" alt="Photo 1">
                <img src="snow.jpg" alt="Photo 2">
                <img src="edinburgh.jpg" alt="Photo 3">
                <img src="roma.jpg" alt="Photo 4">
            </div>
            <button class="nav-btn btn-next" id="nextBtn">&#10095;</button>
        </div>
        <div class="slider-hint">Swipe or drag to explore photos</div>
    </div>

    <div class="center-text">
      <p>I obtained my PhD from the University of Konstanz, supervised by 
        <a href="https://www.biologie.uni-konstanz.de/kleunen/team/prof-dr-mark-van-kleunen/" style="color:inherit; font-weight: bold; text-decoration: underline;">Prof. Dr. Mark van Kleunen</a>. 
        In May 2026, I will join Peking University as a Postdoctoral Fellow.</p>
    </div>

    <footer>&copy; <span id="year"></span> Xiong Shi</footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
        function toggleMenu() { document.getElementById("navMenu").classList.toggle("active"); }

        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('wrapper');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        let slides = document.querySelectorAll('.image-slider img');

        let counter = 1;
        const size = 100; 

        // 无限轮播初始化
        const firstClone = slides[0].cloneNode(true);
        const lastClone = slides[slides.length - 1].cloneNode(true);
        slider.appendChild(firstClone);
        slider.insertBefore(lastClone, slides[0]);

        const allSlides = document.querySelectorAll('.image-slider img');
        slider.style.transform = `translateX(${-size * counter}%)`;

        function moveNext() {
            if (counter >= allSlides.length - 1) return;
            slider.style.transition = "transform 0.5s ease-in-out";
            counter++;
            slider.style.transform = `translateX(${-size * counter}%)`;
        }

        function movePrev() {
            if (counter <= 0) return;
            slider.style.transition = "transform 0.5s ease-in-out";
            counter--;
            slider.style.transform = `translateX(${-size * counter}%)`;
        }

        nextBtn.addEventListener('click', moveNext);
        prevBtn.addEventListener('click', movePrev);

        slider.addEventListener('transitionend', () => {
            if (allSlides[counter].src === firstClone.src && counter === allSlides.length - 1) {
                slider.style.transition = "none";
                counter = 1;
                slider.style.transform = `translateX(${-size * counter}%)`;
            }
            if (allSlides[counter].src === lastClone.src && counter === 0) {
                slider.style.transition = "none";
                counter = allSlides.length - 2;
                slider.style.transform = `translateX(${-size * counter}%)`;
            }
        });

        // 交互逻辑
        let isDragging = false, startPos = 0;

        wrapper.addEventListener('mousedown', dragStart);
        wrapper.addEventListener('touchstart', dragStart);
        wrapper.addEventListener('mousemove', dragMove);
        wrapper.addEventListener('touchmove', dragMove);
        wrapper.addEventListener('mouseup', dragEnd);
        wrapper.addEventListener('touchend', dragEnd);
        wrapper.addEventListener('mouseleave', dragEnd);

        function dragStart(e) {
            isDragging = true;
            startPos = getPositionX(e);
            slider.style.transition = "none";
        }

        function dragMove(e) {
            if (!isDragging) return;
            const currentPosition = getPositionX(e);
            const diff = (currentPosition - startPos) / wrapper.offsetWidth * 100;
            slider.style.transform = `translateX(${-size * counter + diff}%)`;
        }

        function dragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            const movedBy = (parseFloat(slider.style.transform.replace('translateX(', '')) + (counter * size));
            slider.style.transition = "transform 0.5s ease-in-out";
            if (movedBy < -15) moveNext();
            else if (movedBy > 15) movePrev();
            else slider.style.transform = `translateX(${-size * counter}%)`;
        }

        function getPositionX(e) {
            return e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Xiong Shi</title>
    <style>
        body { 
            font-family: 'Aptos', 'Segoe UI', 'Ubuntu', 'Cantarell', 'Helvetica Neue', sans-serif; 
            line-height: 1.6; padding: 20px; max-width: 950px; margin: auto; color: black; 
        }
        #main-title { 
            text-align: center; font-size: clamp(3rem, 12vw, 6rem); 
            font-style: italic; font-weight: bold; margin-top: 0; margin-bottom: 20px;
        }
        .nav-container { position: relative; width: 100%; }
        
        .navigation {
            display: flex; justify-content: center; list-style: none; padding: 0; flex-wrap: wrap;
            margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px;
        }
        .navigation li { margin: 0 25px; }
        .navigation a { 
            text-decoration: none; color: inherit; font-weight: 500; 
            font-size: 1.5rem; letter-spacing: 0.5px; transition: 0.3s;
        }
        .navigation a:hover { text-decoration: underline; opacity: 0.7; }

        .menu-toggle {
            display: none; position: absolute; right: 10px; top: 20px; 
            cursor: pointer; background: none; border: none; padding: 5px; z-index: 100;
        }
        .hamburger-lines { display: flex; flex-direction: column; justify-content: space-between; height: 22px; width: 32px; }
        .line { height: 3px; width: 100%; background-color: black; border-radius: 10px; }

        /* --- 图片轮播容器 --- */
        .slider-wrapper {
            max-width: 450px;
            margin: 40px auto;
            position: relative;
            /* 鼠标移入变小抓手手势，提示可以拖动 */
            cursor: grab;
        }
        .slider-wrapper:active { cursor: grabbing; }

        .image-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; 
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .image-slider::-webkit-scrollbar { display: none; }

        .image-slider img {
            width: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            height: auto;
            object-fit: cover;
            /* 防止拖动图片本身产生干扰 */
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 左右切换按钮（电脑端常用） */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.7); border: none; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; z-index: 10; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .nav-btn:hover { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .btn-prev { left: -18px; }
        .btn-next { right: -18px; }

        .slider-hint { text-align: center; font-size: 0.8rem; color: #999; margin-top: 10px; }

        .center-text { text-align: center; font-size: 1.4rem; padding: 0 10px; max-width: 750px; margin: 0 auto; }
        footer { text-align: center; margin-top: 60px; font-size: 0.8em; color: #666; }

        @media (max-width: 768px) {
            #main-title { text-align: left; padding-right: 60px; font-size: 3rem; }
            .menu-toggle { display: block; }
            .navigation {
                display: none; flex-direction: column; text-align: right;    
                padding-right: 25px; border-bottom: none; background: #fdfdfd; 
                padding-top: 20px; padding-bottom: 20px; width: 100%; 
                position: absolute; top: 80px; left: 0; z-index: 50;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }
            .navigation.active { display: flex; }
            .navigation li { margin: 15px 0; }
            .nav-btn { display: none; } /* 手机端隐藏按钮，使用原生滑动 */
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <h1 id="main-title">Xiong Shi</h1>
        <button class="menu-toggle" onclick="toggleMenu()">
            <div class="hamburger-lines"><span class="line"></span><span class="line"></span><span class="line"></span></div>
        </button>
        <ul class="navigation" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="research.html">Research</a></li>
            <li><a href="publication.html">Publication</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="slider-wrapper">
        <button class="nav-btn btn-prev" onclick="moveSlider(-1)">&#10094;</button>
        <div class="image-slider" id="slider">
            <img src="sunset.jpg" alt="Photo 1">
            <img src="sunset_duck.jpg" alt="Photo 2">
            <img src="edinburgh.jpg" alt="Photo 2">
        </div>
        <button class="nav-btn btn-next" onclick="moveSlider(1)">&#10095;</button>
        <div class="slider-hint">Swipe or Drag to explore</div>
    </div>

    <div class="center-text">
      <p>I obtained my PhD from the University of Konstanz, supervised by 
        <a href="https://www.biologie.uni-konstanz.de/kleunen/team/prof-dr-mark-van-kleunen/" style="color:inherit; font-weight: bold; text-decoration: underline;">Prof. Dr. Mark van Kleunen</a>. 
        In May 2026, I will join Peking University as a Postdoctoral Fellow.</p>
    </div>

    <footer>&copy; <span id="year"></span> Xiong Shi</footer>

    <script>
        // 1. 更新年份
        document.getElementById("year").textContent = new Date().getFullYear();

        // 2. 菜单切换
        function toggleMenu() { 
            document.getElementById("navMenu").classList.toggle("active"); 
        }

        // 3. 按钮点击滑动
        const slider = document.getElementById('slider');
        function moveSlider(direction) {
            const scrollAmount = slider.clientWidth;
            slider.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
        }

        // 4. 电脑端鼠标拖拽实现
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.classList.remove('scroll-behavior-smooth'); // 拖拽时关闭平滑滚动防止冲突
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; // 乘2增加拖动感
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiong Shi - Contact</title>
    <style>
        body { 
            font-family: 'Aptos', 'Segoe UI', 'Ubuntu', sans-serif; 
            line-height: 1.7; margin: 0; padding: 0; color: black; 
            overflow-x: hidden;
        }

        /* 顶部导航全屏装饰 */
        .header-section {
            width: 100%;
            border-bottom: 1px solid #eee;
            padding-top: 50px;
            margin-bottom: 40px;
            position: relative;
        }

        #main-title { 
            text-align: center; font-size: clamp(2.5rem, 8vw, 5.5rem); 
            font-style: italic; font-weight: bold; margin: 0;
            letter-spacing: -1px;
        }

        .nav-container { 
            max-width: 1200px; 
            margin: 0 auto;
            position: relative; 
        }
        
        .navigation {
            display: flex; justify-content: center; list-style: none; padding: 25px 0; margin: 0;
        }
        .navigation li { margin: 0 25px; }
        .navigation a { 
            text-decoration: none; color: inherit; font-weight: 500; 
            font-size: 1.3rem; transition: 0.3s; white-space: nowrap;
        }
        .navigation a:hover { text-decoration: underline; opacity: 0.7; }

        /* 手机端汉堡菜单 */
        .menu-toggle {
            display: none; 
            position: absolute; 
            right: 20px; 
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer; 
            background: none; 
            border: none; 
            padding: 5px; 
            z-index: 1000;
        }
        .hamburger-lines { display: flex; flex-direction: column; justify-content: space-between; height: 20px; width: 28px; }
        .line { height: 3px; width: 100%; background-color: black; border-radius: 10px; }

        /* 主体内容布局 */
        .main-content {
            max-width: 1100px; 
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 联系方式区域样式 */
        .contact-card {
            background: #fff;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
        }

        .contact-item {
            margin-bottom: 30px;
            font-size: 1.3rem;
        }

        .contact-label {
            font-weight: bold;
            display: block;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .contact-value a {
            color: black;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .contact-value a:hover {
            border-bottom: 1px solid black;
        }

        /* 社交链接/学术主页样式 */
        .social-links {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            font-size: 1.1rem;
            color: #444;
            text-decoration: none;
            padding: 8px 15px;
            border: 1px solid #eee;
            border-radius: 5px;
            transition: 0.3s;
        }

        .social-links a:hover {
            background: #f9f9f9;
            border-color: #ccc;
        }

        footer { text-align: center; margin-top: 100px; font-size: 0.85em; color: #999; padding-bottom: 40px; }

        /* 手机端适配修复 */
        @media (max-width: 768px) {
            .header-section { padding-top: 15px; padding-bottom: 15px; margin-bottom: 25px; }
            #main-title { text-align: left; padding-left: 20px; font-size: 2.5rem; }
            
            .menu-toggle { display: block; } 
            
            .navigation {
                display: none; 
                flex-direction: column; 
                text-align: left;    
                padding: 15px 25px; 
                background: #fff; 
                width: 100%; 
                position: absolute; 
                top: 100%; 
                left: 0; 
                z-index: 500;
                box-shadow: 0 8px 15px rgba(0,0,0,0.08);
                border-top: 1px solid #eee;
            }
            .navigation.active { display: flex; }
            .navigation li { margin: 12px 0; }
            .navigation a { font-size: 1.2rem; display: block; width: 100%; }
            
            .contact-card { padding: 20px; }
            .contact-item { font-size: 1.1rem; }
            .social-links { gap: 10px; }
            .social-links a { font-size: 0.95rem; padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="nav-container">
            <h1 id="main-title">Xiong Shi</h1>
            <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle navigation">
                <div class="hamburger-lines">
                    <span class="line"></span>
                    <span class="line"></span>
                    <span class="line"></span>
                </div>
            </button>
            <ul class="navigation" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="publication.html">Publication</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="contact-card">
            
            <div class="contact-item">
                <span class="contact-label">Email</span>
                <div class="contact-value">
                    <a href="mailto:shixiong_eco@163.com">shixiong_eco@163.com</a>
                </div>
            </div>

            <div class="contact-item">
                <span class="contact-label">Current Address</span>
                <div class="contact-value">
                    University of Konstanz, Germany
                </div>
            </div>

            <div class="contact-item">
                <span class="contact-label">Academic Profiles</span>
                <div class="social-links">
                    <a href="https://scholar.google.com/citations?user=YOUR_ID" target="_blank">Google Scholar</a>
                    <a href="https://www.researchgate.net/profile/Xiong-Shi" target="_blank">ResearchGate</a>
                    <a href="https://orcid.org/YOUR_ORCID" target="_blank">ORCID</a>
                </div>
            </div>

        </div>
    </div>

    <footer>&copy; <span id="year"></span> Xiong Shi</footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();

        function toggleMenu() {
            const menu = document.getElementById("navMenu");
            menu.classList.toggle("active");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiong Shi - Research</title>
    <style>
        body { font-family: 'Aptos', 'Segoe UI', sans-serif; line-height: 1.7; margin: 0; padding: 0; color: black; overflow-x: hidden; }
        .header-section { width: 100%; border-bottom: 1px solid #eee; padding-top: 50px; margin-bottom: 40px; position: relative; }
        #main-title { text-align: center; font-size: clamp(2.5rem, 8vw, 5.5rem); font-style: italic; font-weight: bold; margin: 0; letter-spacing: -1px; }
        .nav-container { max-width: 1200px; margin: 0 auto; position: relative; }
        .navigation { display: flex; justify-content: center; list-style: none; padding: 25px 0; margin: 0; }
        .navigation li { margin: 0 25px; }
        .navigation a { text-decoration: none; color: inherit; font-weight: 500; font-size: 1.3rem; transition: 0.3s; }
        .navigation a:hover { text-decoration: underline; opacity: 0.7; }
        .menu-toggle { display: none; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; z-index: 1000; }
        .hamburger-lines { display: flex; flex-direction: column; justify-content: space-between; height: 20px; width: 28px; }
        .line { height: 3px; width: 100%; background-color: black; border-radius: 10px; }

        .main-content { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .research-item { display: flex; gap: 40px; align-items: flex-start; margin-bottom: 80px; }
        .research-item:nth-child(even) { flex-direction: row-reverse; }
        .research-text { flex: 1; font-size: 1.2rem; text-align: justify; }
        .research-text h2 { font-size: 1.8rem; margin-top: 0; border-bottom: 2px solid #000; display: inline-block; margin-bottom: 20px; }
        .research-image { flex: 1; max-width: 500px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        footer { text-align: center; margin-top: 100px; font-size: 0.85em; color: #999; padding-bottom: 40px; }
        #busuanzi_container_site_pv { margin-left: 10px; }

        @media (max-width: 768px) {
            .header-section { padding-top: 15px; padding-bottom: 15px; margin-bottom: 25px; }
            #main-title { text-align: left; padding-left: 20px; font-size: 2.5rem; }
            .menu-toggle { display: block; }
            .navigation { display: none; flex-direction: column; padding: 15px 25px; background: #fff; width: 100%; position: absolute; top: 100%; left: 0; z-index: 500; box-shadow: 0 8px 15px rgba(0,0,0,0.08); }
            .navigation.active { display: flex; }
            .navigation li { margin: 12px 0; }
            .research-item, .research-item:nth-child(even) { flex-direction: column; gap: 20px; }
            .research-image { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="nav-container">
            <h1 id="main-title">Xiong Shi</h1>
            <button class="menu-toggle" onclick="toggleMenu()"><div class="hamburger-lines"><span class="line"></span><span class="line"></span><span class="line"></span></div></button>
            <ul class="navigation" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="publication.html">Publication</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
    <div class="main-content">
        <div class="research-item">
            <div class="research-text">
                <h2>Plant Invasions</h2>
                <p>My research focuses on understanding how invasive plant species establish and dominate in new environments, especially under the context of accumulating global change factors.</p>
            </div>
            <img src="photos/research1.jpg" class="research-image" alt="Research project 1">
        </div>
    </div>
    <footer>&copy; <span id="year"></span> Xiong Shi <span id="busuanzi_container_site_pv" style="display:none">| <span id="busuanzi_value_site_pv"></span> views</span></footer>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
        function toggleMenu() { document.getElementById("navMenu").classList.toggle("active"); }
    </script>
</body>
</html>
